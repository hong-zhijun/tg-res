{% extends "base.html" %}
{% block title %}消息后台{% endblock %}
{% block body %}
<div class="app-shell">
    <div class="app-frame">
    <aside class="sidebar" id="sidebar">
        <div class="brand side-brand">
            <div class="brand-mark brand-mark--small">
                <svg viewBox="0 0 140 140" role="img" aria-label="系统 logo">
                    <defs>
                        <linearGradient id="logoGradient" x1="0" x2="1" y1="0" y2="1"><stop offset="0%" stop-color="#10B160"/><stop offset="100%" stop-color="#059050"/></linearGradient>
                        <filter id="logoShadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#047a40" flood-opacity=".18"/></filter>
                    </defs>
                    <rect x="18" y="18" width="104" height="104" rx="28" fill="url(#logoGradient)" filter="url(#logoShadow)"/>
                    <path d="M37 69 C37 67 38 65 40 64 L97 39 C100 38 103 41 102 44 L86 101 C85 104 81 105 79 103 L65 89 L54 96 C52 97 49 96 49 93 L49 92 L56 80 L81 54 C82 53 82 51 80 52 L52 68 C49 70 47 70 45 69 Z" fill="#fff"/>
                    <path d="M54 80 L81 54" stroke="#07C160" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
                    <path d="M49 92 L54 96 L53 88" fill="#fff"/>
                </svg>
            </div>
            <div>
                <h1>消息后台</h1>
                <p>系统入口</p>
            </div>
        </div>

        <nav class="nav" id="nav">
            <a href="#dashboard" data-route="dashboard">
                <svg viewBox="0 0 24 24" fill="none"><path d="M4 13h7V4H4v9Zm9 7h7V4h-7v16ZM4 20h7v-5H4v5Z" stroke="currentColor" stroke-width="1.7"/></svg>
                仪表盘
            </a>
            <a href="#messages" data-route="messages">
                <svg viewBox="0 0 24 24" fill="none"><path d="M5 6h14v10H8l-3 3V6Z" stroke="currentColor" stroke-width="1.7"/></svg>
                消息列表
            </a>
            <a href="#users" data-route="users">
                <svg viewBox="0 0 24 24" fill="none"><path d="M16 19v-1a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v1M10 11a3 3 0 1 0 0-6 3 3 0 0 0 0 6Zm8 1v7m-3.5-3.5h7" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/></svg>
                用户白名单
            </a>
            <a href="#groups" data-route="groups">
                <svg viewBox="0 0 24 24" fill="none"><path d="M3 7v10a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-6l-2-2H5a2 2 0 00-2 2z" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/></svg>
                分组管理
            </a>
            <a href="#logs" data-route="logs">
                <svg viewBox="0 0 24 24" fill="none"><path d="M6 4h12v16H6V4Zm3 5h6m-6 4h6m-6 4h3" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/></svg>
                日志查看
            </a>
        </nav>

        <div class="sidebar-foot">
            当前环境：生产
        </div>
    </aside>
    <div class="mobile-scrim" id="scrim"></div>

    <main class="main">
        <nav class="mobile-topnav" aria-label="移动端导航">
            <a href="#dashboard" data-route="dashboard">仪表盘</a>
            <a href="#messages" data-route="messages">消息</a>
            <a href="#users" data-route="users">白名单</a>
            <a href="#groups" data-route="groups">分组</a>
            <a href="#logs" data-route="logs">日志</a>
        </nav>
        <header class="topbar">
            <div class="page-title">
                <button class="icon-btn mobile-menu" id="menuBtn" aria-label="打开菜单">☰</button>
                <h1 id="pageTitle">仪表盘</h1>
                <span class="crumb" id="pageCrumb">今日概览</span>
            </div>
            <div class="top-actions">
                <label class="search">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="m21 21-4.2-4.2M10.8 18a7.2 7.2 0 1 1 0-14.4 7.2 7.2 0 0 1 0 14.4Z" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
                    <input id="globalSearch" placeholder="搜索消息、用户、日志">
                </label>
                <button class="btn primary" id="refreshBtn">刷新</button>
                <button class="btn ghost" id="logoutBtn">退出</button>
            </div>
        </header>

        <section class="content">
            <div id="dashboard" class="view">
                <div class="grid" style="gap:22px">
                    <section class="grid cols-4">
                        <article class="card metric"><span class="label">今日消息</span><span class="value" id="metricToday">0</span><div class="stat-foot"><span>今日新增</span><span class="delta good">实时</span></div></article>
                        <article class="card metric"><span class="label">本周消息</span><span class="value" id="metricWeek">0</span><div class="stat-foot"><span>滚动统计</span><span class="delta">7 天</span></div></article>
                        <article class="card metric"><span class="label">本月消息</span><span class="value" id="metricMonth">0</span><div class="stat-foot"><span>本月归档</span><span class="delta">30 天</span></div></article>
                        <article class="card metric"><span class="label">存储占用</span><span class="value text-scale" id="metricStorage">0 B</span><div class="stat-foot"><span>媒体目录</span><span class="delta warn">NAS</span></div></article>
                    </section>

                    <section class="grid cols-2">
                        <article class="card">
                            <div class="section-head"><h2>最近消息</h2><a class="btn link" href="#messages">查看</a></div>
                            <div class="activity" id="recentMessages"></div>
                        </article>
                        <article class="card">
                            <div class="section-head"><h2>类型分布</h2></div>
                            <div class="activity" id="typeDistribution"></div>
                        </article>
                    </section>
                </div>
            </div>

            <div id="messages" class="view">
                <div class="toolbar">
                    <div class="filters">
                        <input id="messageSearch" class="control" placeholder="搜索正文或 caption">
                        <select id="typeFilter" class="control">
                            <option value="">全部类型</option>
                            <option value="text">文本</option>
                            <option value="photo">图片</option>
                            <option value="video">视频</option>
                            <option value="document">文档</option>
                            <option value="voice">语音</option>
                            <option value="audio">音频</option>
                            <option value="animation">动画</option>
                            <option value="sticker">贴纸</option>
                        </select>
                        <input id="dateFrom" class="control" type="date">
                        <input id="dateTo" class="control" type="date">
                    </div>
                    <div class="toolbar-actions">
                        <button class="btn" id="prevPageBtn">上一页</button>
                        <button class="btn" id="nextPageBtn">下一页</button>
                    </div>
                </div>
                <div class="table-card table-wrap">
                    <table>
                        <thead><tr><th>ID</th><th>消息</th><th>类型</th><th>分组</th><th>用户</th><th>时间</th><th>大小</th><th style="text-align:right">操作</th></tr></thead>
                        <tbody id="messageRows"></tbody>
                    </table>
                </div>
            </div>

            <div id="users" class="view">
                <div class="toolbar">
                    <div class="filters">
                        <input class="control" id="userSearch" placeholder="搜索用户名、昵称或备注">
                        <select class="control" id="allowedFilter">
                            <option value="">全部权限</option>
                            <option value="true">已允许</option>
                            <option value="false">未允许</option>
                        </select>
                    </div>
                </div>
                <div class="table-card table-wrap">
                    <table>
                        <thead><tr><th>用户</th><th>权限</th><th>消息数</th><th>最后活跃</th><th>备注</th><th style="text-align:right">操作</th></tr></thead>
                        <tbody id="userRows"></tbody>
                    </table>
                </div>
            </div>

            <div id="groups" class="view">
                <div class="toolbar">
                    <div class="filters">
                        <button class="btn primary" id="addRootGroupBtn">+ 新建根分组</button>
                    </div>
                </div>
                <div class="table-card">
                    <div class="group-tree" id="groupTree"></div>
                </div>
            </div>

            <div id="logs" class="view">
                <div class="toolbar">
                    <div class="filters">
                        <select class="control" id="logLevelFilter">
                            <option value="">全部 level</option>
                            <option value="INFO">INFO</option>
                            <option value="WARNING">WARNING</option>
                            <option value="ERROR">ERROR</option>
                        </select>
                        <input class="control" id="logSearch" placeholder="搜索日志内容">
                    </div>
                    <button class="btn" id="refreshLogsBtn">刷新日志</button>
                </div>
                <div class="table-card log-card">
                    <div id="logRows"></div>
                </div>
            </div>
        </section>
    </main>
    </div>
</div>

<div class="modal-backdrop" id="modalBackdrop" role="dialog" aria-modal="true">
    <div class="modal" id="modalBox">
        <div class="modal-head">
            <h3 id="modalTitle">标题</h3>
            <button class="icon-btn" id="modalClose" aria-label="关闭">×</button>
        </div>
        <div class="modal-body" id="modalBody"></div>
        <div class="modal-foot" id="modalFoot"></div>
    </div>
</div>

<div class="toast-stack" id="toastStack" aria-live="polite"></div>
<script src="/static/admin.js"></script>
{% endblock %}
