{% extends "base.html" %}
{% block title %}登录 - 消息后台{% endblock %}
{% block body %}
<div class="login-screen">
    <form method="post" action="/login" class="login-card">
        <div class="brand login-brand">
            <div class="brand-mark">
                <svg viewBox="0 0 140 140" role="img" aria-label="系统 logo">
                    <defs>
                        <linearGradient id="loginLogoGradient" x1="0" x2="1" y1="0" y2="1"><stop offset="0%" stop-color="#10B160"/><stop offset="100%" stop-color="#059050"/></linearGradient>
                        <filter id="loginLogoShadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#047a40" flood-opacity=".18"/></filter>
                    </defs>
                    <rect x="18" y="18" width="104" height="104" rx="28" fill="url(#loginLogoGradient)" filter="url(#loginLogoShadow)"/>
                    <path d="M37 69 C37 67 38 65 40 64 L97 39 C100 38 103 41 102 44 L86 101 C85 104 81 105 79 103 L65 89 L54 96 C52 97 49 96 49 93 L49 92 L56 80 L81 54 C82 53 82 51 80 52 L52 68 C49 70 47 70 45 69 Z" fill="#fff"/>
                    <path d="M54 80 L81 54" stroke="#07C160" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
                    <path d="M49 92 L54 96 L53 88" fill="#fff"/>
                </svg>
            </div>
            <div>
                <h1>消息后台</h1>
                <p>系统入口</p>
            </div>
        </div>
        {% if error %}<p class="form-error">{{ error }}</p>{% endif %}
        <div class="field">
            <label for="password">密码</label>
            <input id="password" type="password" name="password" placeholder="请输入管理密码" autocomplete="current-password" autofocus>
        </div>
        <button class="btn primary" type="submit">登录</button>
    </form>
</div>
{% endblock %}
